<!DOCTYPE html>
<html lang="ru,es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA_Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь</title>

    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/styles.scss">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comforter&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Comforter&display=swap" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bad+Script&display=swap" rel="stylesheet">
</head>

<body>

    <header class="header"> 

        <span id="section__word-counter">
            Выученные слова: 0
        </span>

        <h1>Словарь</h1>

        <img src="images\spain_logo.png"  alt="Флаг Испании" loading="lazy">

    </header>

    <div class="section">
        <div class="section__sorting">
            <label for="tags">Сортировка слов:</label>
            <select name="cars" id="tags">
                <option value="all">Все</option>
                <option value="numbers">Числа и цифры</option>
                <option value="pronouns">Местоимения</option>
                <option value="prepositions">Предлоги и союзы</option>
                <option value="characteristics">Цвета и свойства</option>
                <option value="time">Время</option>
                <option value="verbs">Глаголы</option>
                <option value="human">Человек</option>
                <option value="food">Еда</option>
                <option value="home">Дом и быт</option>
                <option value="work">Работа и увлечения</option>
                <option value="trips">Путешествия</option>
                <option value="nature">Природа</option>
            </select>
        </div>

        <form class="section__search" method="get">
            <input class="section__search__input" placeholder="Поиск словa" type="search" inputmode="text">
            <button class="section__search__button" type="submit"></button>
          </form>
    </div>


    <div class="section-input">

        <div class="section-input__rus">
            <label for="text-rus"></label>
            <input type="text" id="text-rus" placeholder="русский">
        </div>
        
        <div class="section-input__esp">
            <label for="text-esp"></label>
            <input type="text" id="text-esp" placeholder="испанский">
        </div>

        <div class="section-input__tags-tables">
            <label for="tags-tables"></label>
                <select name="cars" id="tags-tables">
                    <option value="all">Все</option>
                    <option value="numbers">Числа и цифры</option>
                    <option value="pronouns">Местоимения</option>
                    <option value="prepositions">Предлоги и союзы</option>
                    <option value="characteristics">Цвета и свойства</option>
                    <option value="time">Время</option>
                    <option value="verbs">Глаголы</option>
                    <option value="human">Человек</option>
                    <option value="food">Еда</option>
                    <option value="home">Дом и быт</option>
                    <option value="work">Работа и увлечения</option>
                    <option value="trips">Путешествия</option>
                    <option value="nature">Природа</option>
                </select>
            </div>

            <div class="section-input__add">
                <button class="section-input__add__input" type="button"></button>
            </div>

    </div>

    <div class="table">
        <table class="table__main">
            <thead>
                <tr>
                    <th class="table__main__number">№</th>
                    <th class="table__main__ru">Русский</th>
                    <th class="table__main__esp">Испанский</th>
                    <th class="table__main__sort">Категория</th>
                    <th class="table__main__delete">Удалить</th>
                </tr>
            </thead>
            <tbody>   
                <tr>
                    <td>1</td>
                    <td>Кот</td>
                    <td>Cat</td>
                    <td>Природа</td>
                    <td><input type="button" class="table__main__button"></td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Собака</td>
                    <td>Dog</td>
                    <td>Природа</td>
                    <td><input type="button" class="table__main__button"></td>
                </tr>
            </tbody> 
        </table>
    </div>












    </div>

</body>
</html>
